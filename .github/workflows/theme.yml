name: Get Coffin Theme (Fixed)
on: workflow_dispatch
permissions:
  contents: write
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force Download Hacker Assets
        run: |
          curl -f -L "https://giphy.com" -o glitch-header.gif
          curl -f -L "https://giphy.com" -o access-granted.gif

      - name: Safe Commit and Push
        run: |
          git config --global user.name "ThemeBot"
          git config --global user.email "bot@github.com"
          git add glitch-header.gif access-granted.gif
          git diff --quiet && git diff --staged --quiet || (git commit -m "Force update theme assets" && git push)
